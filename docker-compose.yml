services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: bathroomwatch
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: BathroomWatch.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=bathroomwatch;Username=postgres;Password=postgres
      Jwt__Issuer: BathroomWatch.Api
      Jwt__Audience: BathroomWatch.Web
      Jwt__SigningKey: dev-key-change-this-to-a-long-secret-value
      Cors__AllowedOrigins__0: http://localhost:5173
    ports:
      - "5166:8080"
    depends_on:
      - postgres

volumes:
  pgdata:
